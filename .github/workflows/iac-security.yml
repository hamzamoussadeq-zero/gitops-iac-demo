# Caller workflow — this is what lives in each individual repo.
# It delegates to the reusable workflows defined in the central workflows repo.
# Repos that only have Terraform drop the helm-scan job and vice versa.

name: IaC Security Scan

on:
  pull_request:
    paths:
      - "terraform/**"
      - "helm/**"
      - ".checkov.yaml"
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - "helm/**"

jobs:
  terraform-scan:
    uses: your-org/central-workflows/.github/workflows/terraform-security-scan.yml@main
    permissions:
      contents: read
      pull-requests: write

  helm-scan:
    uses: your-org/central-workflows/.github/workflows/helm-security-scan.yml@main
    permissions:
      contents: read
      pull-requests: write
