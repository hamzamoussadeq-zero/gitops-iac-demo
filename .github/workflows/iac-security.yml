name: IaC Security Scan

on:
  pull_request:
    paths:
      - "terraform/**"
      - "helm/**"
      - "docker/**"
      - ".checkov.yaml"
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - "helm/**"
      - "docker/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  checkov:
    name: Checkov Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          config_file: .checkov.yaml
          output_format: cli
          soft_fail: false

  pr-summary:
    name: PR Summary Comment
    runs-on: ubuntu-latest
    needs: checkov
    if: github.event_name == 'pull_request' && always()

    steps:
      - name: Post result summary
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ needs.checkov.result }}';
            const icon = result === 'success' ? '✅' : result === 'failure' ? '❌' : '⚠️';
            const body = [
              '## IaC Security Scan Results',
              '',
              `| Scan | Result |`,
              `|------|--------|`,
              `| Checkov (Terraform, Helm, Dockerfile) | ${icon} ${result} |`,
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
