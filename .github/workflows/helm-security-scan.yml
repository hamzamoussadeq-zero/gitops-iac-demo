# Reusable workflow — lives in the central workflows repo.
# Called by individual Helm repos via:
#
#   jobs:
#     helm-scan:
#       uses: your-org/central-workflows/.github/workflows/helm-security-scan.yml@main
#       permissions:
#         contents: read
#         pull-requests: write

name: Helm Security Scan

on:
  workflow_dispatch:
  workflow_call:

jobs:
  # ---------------------------------------------------------------------------
  # Detect which charts changed — only scan those, not the whole repo
  # ---------------------------------------------------------------------------
  get-changed-charts:
    name: Read changed charts
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Get changed charts and set matrix
        id: set-matrix
        uses: deliverect/gh-workflows/actions/helm/detect-changes@master

  # ---------------------------------------------------------------------------
  # Run Checkov on each changed chart in parallel
  # ---------------------------------------------------------------------------
  scan-chart:
    name: Scan chart
    needs: get-changed-charts
    if: needs.get-changed-charts.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        chart: ${{ fromJson(needs.get-changed-charts.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov
        id: scan
        run: |
          set +e
          checkov -d ${{ matrix.chart }} \
            --framework helm \
            --config-file .checkov.yaml \
            --output cli \
            --output json \
            --output-file-path console,results.json \
            --quiet
          echo "exit_code=$?" >> $GITHUB_OUTPUT
          set -e

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const exitCode = '${{ steps.scan.outputs.exit_code }}';
            const chart = '${{ matrix.chart }}';
            const passed = exitCode === '0';

            let body = `## Helm Security Scan — \`${chart}\`\n\n`;

            try {
              const raw = JSON.parse(fs.readFileSync('results.json', 'utf8'));
              const results = Array.isArray(raw) ? raw : [raw];

              body += '### Summary\n\n';
              body += '| Framework | ✅ Passed | ❌ Failed | ⏭ Skipped |\n';
              body += '|-----------|----------|----------|----------|\n';
              for (const r of results) {
                const s = r.summary ?? {};
                body += `| \`${r.check_type}\` | ${s.passed ?? 0} | ${s.failed ?? 0} | ${s.skipped ?? 0} |\n`;
              }

              for (const r of results) {
                const failed = r.results?.failed_checks ?? [];
                if (!failed.length) continue;

                body += `\n---\n\n### ❌ \`${r.check_type}\` — Failed Checks\n\n`;
                body += '| Check ID | What it checks | Severity | Resource | File | Line |\n';
                body += '|----------|----------------|----------|----------|------|------|\n';

                for (const c of failed) {
                  const id       = c.check_id ?? '—';
                  const name     = c.check_name ?? '—';
                  const sev      = c.severity ?? 'N/A';
                  const resource = c.resource ?? '—';
                  const file     = (c.repo_file_path ?? c.file_path ?? '—').replace(/^\//, '');
                  const line     = c.file_line_range ? c.file_line_range[0] : '—';
                  body += `| \`${id}\` | ${name} | ${sev} | \`${resource}\` | \`${file}\` | ${line} |\n`;
                }
              }

              body += `\n---\n\n**Overall: ${passed ? '✅ All checks passed' : '❌ Issues found — merge blocked'}**`;

            } catch (e) {
              body += `> ⚠️ Could not parse scan results: ${e.message}`;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if violations found
        if: steps.scan.outputs.exit_code != '0'
        run: exit 1

  # ---------------------------------------------------------------------------
  # Single status check for branch protection rules
  # (branch protection can't target a matrix job directly)
  # ---------------------------------------------------------------------------
  scan-status:
    name: Helm Scan Result
    needs: scan-chart
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check scan matrix status
        if: needs.scan-chart.result != 'success' && needs.scan-chart.result != 'skipped'
        run: exit 1
