name: Terraform Security Scan

on:
  workflow_dispatch:
  workflow_call:
  

jobs:
  checkov:
    name: Checkov тАФ Terraform
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

#      - name: Fetch Checkov config
        # TODO: Update this URL to point to where the central Checkov config is stored This allows us to maintain a single source of truth for all Checkov policies
   #     run: |
     #     curl -sSL https://raw.githubusercontent.com/deliverect/gh-workflows/main/<PATH>/.checkov.terraform.yaml \
     #       -o .checkov.yaml

      - name: Install Checkov
        run: pip install checkov==3.2.424

      - name: Run Checkov
        id: scan
        run: |
          set +e
          checkov -d . --framework terraform --config-file .checkov.terraform.yaml --output cli --output json --output-file-path console,results.json --quiet
          echo "exit_code=$?" >> $GITHUB_OUTPUT
          set -e

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const exitCode = '${{ steps.scan.outputs.exit_code }}';
            const passed = exitCode === '0';

            let body = '## Terraform Security Scan Results\n\n';

            try {
              const raw = JSON.parse(fs.readFileSync('results.json', 'utf8'));
              const results = Array.isArray(raw) ? raw : [raw];

              body += '### Summary\n\n';
              body += '| Framework | тЬЕ Passed | тЭМ Failed | тПн Skipped |\n';
              body += '|-----------|----------|----------|----------|\n';
              for (const r of results) {
                const s = r.summary ?? {};
                body += `| \`${r.check_type}\` | ${s.passed ?? 0} | ${s.failed ?? 0} | ${s.skipped ?? 0} |\n`;
              }

              for (const r of results) {
                const failed = r.results?.failed_checks ?? [];
                if (!failed.length) continue;

                body += `\n---\n\n### тЭМ \`${r.check_type}\` тАФ Failed Checks\n\n`;
                body += '| Check ID | What it checks | Severity | Resource | File | Line |\n';
                body += '|----------|----------------|----------|----------|------|------|\n';

                for (const c of failed) {
                  const id       = c.check_id ?? 'тАФ';
                  const name     = c.check_name ?? 'тАФ';
                  const sev      = c.severity ?? 'N/A';
                  const resource = c.resource ?? 'тАФ';
                  const file     = (c.repo_file_path ?? c.file_path ?? 'тАФ').replace(/^\//, '');
                  const line     = c.file_line_range ? c.file_line_range[0] : 'тАФ';
                  body += `| \`${id}\` | ${name} | ${sev} | \`${resource}\` | \`${file}\` | ${line} |\n`;
                }
              }

              body += `\n---\n\n**Overall: ${passed ? 'тЬЕ All checks passed' : 'тЭМ Issues found тАФ merge blocked'}**`;

            } catch (e) {
              body += `> тЪая╕П Could not parse scan results: ${e.message}`;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if violations found
        if: steps.scan.outputs.exit_code != '0'
        run: exit 1
