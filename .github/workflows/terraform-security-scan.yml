# Reusable workflow — lives in the central workflows repo.
# Called by individual Terraform repos via:
#
#   jobs:
#     terraform-scan:
#       uses: your-org/central-workflows/.github/workflows/terraform-security-scan.yml@main
#       permissions:
#         contents: read
#         pull-requests: write

name: Terraform Security Scan

on:
  workflow_dispatch:
    inputs:
      directory:
        description: Directory to scan (relative to repo root)
        type: string
        default: terraform
  workflow_call:
    inputs:
      directory:
        description: Directory to scan (relative to repo root)
        type: string
        default: terraform

jobs:
  checkov:
    name: Checkov — Terraform
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Checkov config
        run: |
          curl -sSL https://raw.githubusercontent.com/hamzamoussadeq-zero/gitops-iac-demo/main/.checkov.terraform.yaml \
            -o .checkov.yaml

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov
        id: scan
        run: |
          set +e
          checkov -d ${{ inputs.directory }} \
            --framework terraform \
            --config-file .checkov.yaml \
            --output cli \
            --output json \
            --output-file-path console,results.json \
            --quiet
          echo "exit_code=$?" >> $GITHUB_OUTPUT
          set -e

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const exitCode = '${{ steps.scan.outputs.exit_code }}';
            const passed = exitCode === '0';

            let body = '## Terraform Security Scan Results\n\n';

            try {
              const raw = JSON.parse(fs.readFileSync('results.json', 'utf8'));
              const results = Array.isArray(raw) ? raw : [raw];

              body += '### Summary\n\n';
              body += '| Framework | ✅ Passed | ❌ Failed | ⏭ Skipped |\n';
              body += '|-----------|----------|----------|----------|\n';
              for (const r of results) {
                const s = r.summary ?? {};
                body += `| \`${r.check_type}\` | ${s.passed ?? 0} | ${s.failed ?? 0} | ${s.skipped ?? 0} |\n`;
              }

              for (const r of results) {
                const failed = r.results?.failed_checks ?? [];
                if (!failed.length) continue;

                body += `\n---\n\n### ❌ \`${r.check_type}\` — Failed Checks\n\n`;
                body += '| Check ID | What it checks | Severity | Resource | File | Line |\n';
                body += '|----------|----------------|----------|----------|------|------|\n';

                for (const c of failed) {
                  const id       = c.check_id ?? '—';
                  const name     = c.check_name ?? '—';
                  const sev      = c.severity ?? 'N/A';
                  const resource = c.resource ?? '—';
                  const file     = (c.repo_file_path ?? c.file_path ?? '—').replace(/^\//, '');
                  const line     = c.file_line_range ? c.file_line_range[0] : '—';
                  body += `| \`${id}\` | ${name} | ${sev} | \`${resource}\` | \`${file}\` | ${line} |\n`;
                }
              }

              body += `\n---\n\n**Overall: ${passed ? '✅ All checks passed' : '❌ Issues found — merge blocked'}**`;

            } catch (e) {
              body += `> ⚠️ Could not parse scan results: ${e.message}`;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if violations found
        if: steps.scan.outputs.exit_code != '0'
        run: exit 1
