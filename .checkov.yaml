compact: true
download-external-modules: false

framework:
  - terraform
  - helm
  - kubernetes
  - dockerfile

exclude-path:
  - "**/.terraform"
  - "**/*.tfstate"
  - "**/*.tfstate.backup"
  - "**/examples"
  - "**/tests"

soft-fail-on:
  - LOW
  - MEDIUM

# Permanently skipped checks — each entry must have a documented reason.
# Treat this list as a risk register. Review quarterly.
skip-check:
  - CKV_GCP_114  # CMEK encryption: not in scope for this POC — tracked in ADR-001
  - CKV_GCP_38   # CSEK for VM disks: not used org-wide — approved exception SEC-042
