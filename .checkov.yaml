compact: true
download-external-modules: false

framework:
  - terraform
  - helm
  - kubernetes
  - dockerfile

skip-path:
  - "**/.terraform"
  - "**/*.tfstate"
  - "**/*.tfstate.backup"
  - "**/examples"
  - "**/tests"

# Only HIGH and CRITICAL block the pipeline
soft-fail-on:
  - LOW
  - MEDIUM

# Permanently skipped checks — each entry must have a documented reason.
# Treat this list as a risk register and review quarterly.
skip-check:
  - CKV_GCP_114  # CMEK encryption: not in scope for this POC — ADR-001
  - CKV_GCP_38   # CSEK for VM disks: org-wide approved exception — SEC-042
